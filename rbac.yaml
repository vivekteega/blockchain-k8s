# Role - defines what actions are allowed
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blockchain-viewer
  namespace: blockchain
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "configmaps"]
  verbs: ["get", "list", "watch"]

---
# ServiceAccount - the identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: junior-dev
  namespace: blockchain

---
# RoleBinding - connects the two
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: junior-dev-viewer
  namespace: blockchain
subjects:
- kind: ServiceAccount
  name: junior-dev
  namespace: blockchain
roleRef:
  kind: Role
  name: blockchain-viewer
  apiGroup: rbac.authorization.k8s.io
