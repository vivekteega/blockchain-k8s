apiVersion: apps/v1
kind: Deployment
metadata:
  name: anvil
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anvil
  template:
    metadata:
      labels:
        app: anvil
    spec:
      containers:
      - name: anvil
        image: ghcr.io/foundry-rs/foundry:latest
        command: ["anvil"]
        args:
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8545"
        - "--chain-id"
        - "31337"
        ports:
        - containerPort: 8545
        livenessProbe:
          tcpSocket:
            port: 8545
          initialDelaySeconds: 10
          periodSeconds: 15
