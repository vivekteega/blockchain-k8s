apiVersion: apps/v1
kind: Deployment
metadata:
  name: anvil
  namespace: blockchain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anvil
  template:
    metadata:
      labels:
        app: anvil
    spec:
      containers:
      - name: anvil
        image: ghcr.io/foundry-rs/foundry:latest
        command: ["anvil"]
        args:
        - "--host"
        - "$(ANVIL_HOST)"
        - "--port"
        - "$(ANVIL_PORT)"
        - "--chain-id"
        - "$(ANVIL_CHAIN_ID)"
        - "--block-time"
        - "$(ANVIL_BLOCK_TIME)"
        ports:
        - containerPort: 8545
        env:
        - name: ANVIL_HOST
          valueFrom:
            configMapKeyRef:
              name: anvil-config
              key: ANVIL_HOST
        - name: ANVIL_PORT
          valueFrom:
            configMapKeyRef:
              name: anvil-config
              key: ANVIL_PORT
        - name: ANVIL_CHAIN_ID
          valueFrom:
            configMapKeyRef:
              name: anvil-config
              key: ANVIL_CHAIN_ID
        - name: ANVIL_BLOCK_TIME
          valueFrom:
            configMapKeyRef:
              name: anvil-config
              key: ANVIL_BLOCK_TIME
        - name: PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: anvil-keys
              key: private-key
        - name: MNEMONIC
          valueFrom:
            secretKeyRef:
              name: anvil-keys
              key: mnemonic
        livenessProbe:
          tcpSocket:
            port: 8545
          initialDelaySeconds: 10
          periodSeconds: 15
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 8545
          initialDelaySeconds: 5
          periodSeconds: 10
