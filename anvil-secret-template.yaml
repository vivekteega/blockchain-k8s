# DO NOT put real values here - this is a template only
# Create the actual secret with:
# kubectl create secret generic anvil-keys \
#   --from-literal=private-key=<YOUR_PRIVATE_KEY> \
#   --from-literal=mnemonic="<YOUR_MNEMONIC>"
apiVersion: v1
kind: Secret
metadata:
  name: anvil-keys
  namespace: default
type: Opaque
data:
  private-key: <base64-encoded-private-key>
  mnemonic: <base64-encoded-mnemonic>
